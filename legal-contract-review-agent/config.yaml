# Legal Contract Review Agent Configuration

llm:
  provider: "mimo"
  model: "mimo-v2-pro"
  api_key_env: "MIMO_API_KEY"
  temperature: 0.0
  max_tokens: 4000

agents:
  parsing:
    enabled: true
  extraction:
    clause_types_path: "data/clause_types.json"
  risk:
    regulation_db: "data/regulations.json"
    risk_threshold: 5
  compliance:
    policy_file: "data/internal_policies.json"
  supervisor:
    max_retries: 3
